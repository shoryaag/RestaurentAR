<!DOCTYPE html>
<!-- update -->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant AR Menu</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #nextDish {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- Button -->
<button id="nextDish">Next Dish</button>

<!-- AR Scene -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false"
>

  <a-marker type="pattern" url="./marker.patt">

  <a-gltf-model
    id="dishModel"
    src="./dish1.glb"
    position="0 0 0"
    rotation="0 0 0"
    scale="0.03 0.03 0.03">
</a-gltf-model>

</a-marker>

  <a-entity camera="fov: 100"></a-entity>

</a-scene>
<!-- Dish Switching Logic -->
<script src="script.js"></script>

</body>
</html>
